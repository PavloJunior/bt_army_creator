<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#00ff41" stroke-width="1">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="80" opacity="0.3"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="40" opacity="0.2"/>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="3" fill="#00ff41" opacity="0.4"/>
  <!-- Crosshair lines -->
  <line x1="100" y1="10" x2="100" y2="55" opacity="0.3"/>
  <line x1="100" y1="145" x2="100" y2="190" opacity="0.3"/>
  <line x1="10" y1="100" x2="55" y2="100" opacity="0.3"/>
  <line x1="145" y1="100" x2="190" y2="100" opacity="0.3"/>
  <!-- Corner ticks -->
  <line x1="30" y1="30" x2="45" y2="30" opacity="0.2"/>
  <line x1="30" y1="30" x2="30" y2="45" opacity="0.2"/>
  <line x1="170" y1="30" x2="155" y2="30" opacity="0.2"/>
  <line x1="170" y1="30" x2="170" y2="45" opacity="0.2"/>
  <line x1="30" y1="170" x2="45" y2="170" opacity="0.2"/>
  <line x1="30" y1="170" x2="30" y2="155" opacity="0.2"/>
  <line x1="170" y1="170" x2="155" y2="170" opacity="0.2"/>
  <line x1="170" y1="170" x2="170" y2="155" opacity="0.2"/>
</svg>
